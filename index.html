<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Fútbol - Inicio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Esto ayudará a que el sitio se vea más lleno y profesional */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        header {
            background-color: #1a5e1a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #4CAF50;
        }
        section {
            flex: 1; /* Esto empuja el footer hacia abajo para que no haya huecos */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        article {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
            border: 2px solid #ddd;
        }
        footer {
            background-color: #1a5e1a;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: auto;
        }
        .social-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #3b5998;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Pasión por el Fútbol</h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="jugadores.html">Jugadores</a>
    </nav>

    <section>
        <article>
            <h2>Bienvenidos a mi sitio de Fútbol</h2>
            <p>Explorando lo mejor del deporte rey.<br>Resultados, equipos y más.</p>
            
            <img src="futbol.jpg" alt="Balón de fútbol en la cancha">
            
            <p>Síguenos en nuestras redes oficiales:</p>
            <a href="https://www.facebook.com" class="social-link">Nuestro Facebook</a>
        </article>
    </section>

    <footer>
        <p>&copy; 2026 Juan José - Prepa 10</p>
    </footer>
</body>
</html>
